<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Confirmación de Email</title>
  <style>
    body { font-family: sans-serif; padding: 30px; background: #f7f9fc; color: #1f2937; }
    .card { max-width: 620px; margin: 0 auto; padding: 24px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    h1 { margin-top: 0; }
    pre { background: #f4f4f5; padding: 14px; border-radius: 8px; overflow-x: auto; }
    .success { color: #166534; }
    .error { color: #991b1b; }
    a { color: #0b74de; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Confirmación de Email</h1>
    <p>Supabase está procesando tu confirmación. En unos segundos verás el resultado.</p>
    <div id="result"></div>
    <pre id="debug"></pre>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://qcvzpzwwuscvemtlepxi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInJlZiI6InFjdnpwend3dXNjdmVtdGxlcHhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MjU5MTQsImV4cCI6MjA5MTEwMTkxNH0.R8rTLPjF_ODIfpXUmTgfSD357eJ8nxLq_ICHiBP_3Pg';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const resultEl = document.getElementById('result');
    const debugEl = document.getElementById('debug');

    async function confirmEmail() {
      try {
        // Para Supabase v2, procesar la URL de confirmación
        const { data, error } = await supabase.auth.getSession();

        if (error) {
          resultEl.innerHTML = `<p class="error">No se pudo obtener la sesión: ${error.message}</p>`;
          debugEl.textContent = JSON.stringify(error, null, 2);
          return;
        }

        if (data?.session) {
          resultEl.innerHTML = '<p class="success">¡Email confirmado y usuario autenticado!</p>' +
            '<p>La sesión se ha establecido correctamente.</p>' +
            '<p><a href="test-ui.html">Ir al panel de pruebas</a></p>';
          debugEl.textContent = JSON.stringify(data.session, null, 2);
          return;
        }

        // Si no hay sesión, verificar si hay parámetros de confirmación en la URL
        const urlParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = urlParams.get('access_token');
        const refreshToken = urlParams.get('refresh_token');

        if (accessToken && refreshToken) {
          // Establecer la sesión manualmente
          const { data: sessionData, error: sessionError } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });

          if (sessionError) {
            resultEl.innerHTML = `<p class="error">Error al establecer sesión: ${sessionError.message}</p>`;
            debugEl.textContent = JSON.stringify(sessionError, null, 2);
          } else {
            resultEl.innerHTML = '<p class="success">¡Email confirmado y usuario autenticado!</p>' +
              '<p>La sesión se ha establecido correctamente.</p>' +
              '<p><a href="test-ui.html">Ir al panel de pruebas</a></p>';
            debugEl.textContent = JSON.stringify(sessionData, null, 2);
          }
        } else {
          resultEl.innerHTML = '<p class="error">No se encontraron parámetros de confirmación en la URL.</p>';
          debugEl.textContent = window.location.href;
        }
      } catch (err) {
        resultEl.innerHTML = `<p class="error">Error inesperado: ${err.message}</p>`;
        debugEl.textContent = err.stack || String(err);
      }
    }

    confirmEmail();
  </script>
</body>
</html>
